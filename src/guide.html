<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JD-Sync 설정</title>
    <link rel="stylesheet" href="guide.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">JD-Sync</p>
          <h1>설정</h1>
        </div>
      </header>

      <section class="setup-guide">
        <a
          class="guide-action"
          href="https://sweltering-zucchini-fa4.notion.site/38169b4b1a31807ebb34f87abda89917?v=38a69b4b1a31806ca28f000cfa5d3974"
          target="_blank"
          rel="noreferrer"
        >
          설정 가이드 보러가기
        </a>
      </section>

      <form id="settingsForm" class="panel settings-panel">
        <section class="section-block">
          <h2>Notion 연결</h2>
          <label>
            Notion 토큰
            <input id="notionToken" type="password" autocomplete="off" placeholder="ntn_..." />
          </label>

          <label>
            Notion Data Source ID
            <input id="notionParentId" type="text" placeholder="Notion 데이터소스 ID" />
          </label>
        </section>

        <section class="section-block">
          <h2>Notion Database 설정</h2>
          <p class="calendar-source-note">Notion Calendar는 <code>일정</code> 칸으로 연결하세요.</p>
          <div class="grid">
            <label>
              <span class="field-label">
                공고명
                <span
                  class="help"
                  tabindex="0"
                  aria-label="공고명 설명"
                  data-tooltip="Notion DB의 제목 칸입니다. 채용 공고 제목이 들어갑니다."
                >?</span>
              </span>
              <input id="titleProperty" type="text" />
            </label>
            <label>
              <span class="field-label">
                회사명
                <span
                  class="help"
                  tabindex="0"
                  aria-label="회사명 설명"
                  data-tooltip="채용 공고의 회사명을 저장하는 칸입니다."
                >?</span>
              </span>
              <input id="companyProperty" type="text" />
            </label>
            <label>
              <span class="field-label">
                직무
                <span
                  class="help"
                  tabindex="0"
                  aria-label="직무 설명"
                  data-tooltip="자소설에서 읽은 모집 직무 정보를 저장하는 칸입니다."
                >?</span>
              </span>
              <input id="dutiesProperty" type="text" />
            </label>
            <label>
              <span class="field-label">
                시작일
                <span
                  class="help"
                  tabindex="0"
                  aria-label="시작일 설명"
                  data-tooltip="공고 접수 시작일을 저장하는 날짜 칸입니다."
                >?</span>
              </span>
              <input id="startDateProperty" type="text" />
            </label>
            <label>
              <span class="field-label">
                마감일
                <span
                  class="help"
                  tabindex="0"
                  aria-label="마감일 설명"
                  data-tooltip="공고 접수 마감일을 저장하는 날짜 칸입니다."
                >?</span>
              </span>
              <input id="deadlineDateProperty" type="text" />
            </label>
            <label>
              <span class="field-label">
                일정
                <span
                  class="help"
                  tabindex="0"
                  aria-label="일정 설명"
                  data-tooltip="Notion Calendar에서 기준 날짜로 선택해야 하는 칸입니다. 시작일을 선택하면 캘린더가 시작일 기준으로 보입니다."
                >?</span>
              </span>
              <input id="dateProperty" type="text" />
            </label>
            <label>
              <span class="field-label">
                공고 URL
                <span
                  class="help"
                  tabindex="0"
                  aria-label="공고 URL 설명"
                  data-tooltip="자소설 공고 원문 링크를 저장하는 칸입니다."
                >?</span>
              </span>
              <input id="urlProperty" type="text" />
            </label>
            <label>
              <span class="field-label">
                지원 URL
                <span
                  class="help"
                  tabindex="0"
                  aria-label="지원 URL 설명"
                  data-tooltip="기업 지원 페이지 링크가 있을 때 저장하는 칸입니다."
                >?</span>
              </span>
              <input id="applyUrlProperty" type="text" />
            </label>
            <label>
              <span class="field-label">
                공고 ID
                <span
                  class="help"
                  tabindex="0"
                  aria-label="공고 ID 설명"
                  data-tooltip="자소설 공고 고유 ID입니다. 중복 등록 확인과 삭제 동기화에 사용합니다."
                >?</span>
              </span>
              <input id="sourceIdProperty" type="text" />
            </label>
          </div>
        </section>

        <section class="section-block">
          <h2>동기화 옵션</h2>
          <label class="checkbox">
            <input id="autoSync" type="checkbox" />
            즐겨찾기 시 자동 동기화
          </label>
          <label class="checkbox">
            <input id="includeStartDateInCalendar" type="checkbox" />
            시작일도 캘린더에 추가하기
          </label>
          <fieldset id="startDateCalendarMode" class="mode-group" hidden>
            <legend>시작일 표시 방식</legend>
            <label class="radio-option">
              <input type="radio" name="startDateCalendarMode" value="range" />
              <span>
                <strong>하나로 합쳐서 만들기</strong>
                <small><code>일정</code>을 시작일~마감일 범위로 저장합니다. Notion 행은 하나만 생깁니다.</small>
              </span>
            </label>
            <label class="radio-option">
              <input type="radio" name="startDateCalendarMode" value="separate" />
              <span>
                <strong>시작일을 별도 일정으로 만들기</strong>
                <small>마감일 행은 그대로 만들고, <code>[시작]</code> 행을 하나 더 만듭니다.</small>
              </span>
            </label>
          </fieldset>
        </section>

        <div class="actions">
          <button id="saveButton" type="submit">설정 저장</button>
          <button id="resetButton" type="button" class="secondary">기본값 복원</button>
        </div>
      </form>

      <section class="panel logs-panel">
        <div class="logs-header">
          <h2>최근 동기화 기록</h2>
          <button id="clearLogsButton" type="button" class="secondary small">기록 지우기</button>
        </div>
        <ol id="logList"></ol>
      </section>
    </main>

    <div id="settingsToast" class="toast" role="status" aria-live="polite"></div>

    <script src="guide.js"></script>
  </body>
</html>
