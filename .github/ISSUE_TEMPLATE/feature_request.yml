name: 기능 제안
description: JD-Sync 개선 아이디어를 제안합니다
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제
      description: 어떤 사용자 문제를 해결하나요?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안
      description: JD-Sync가 어떻게 동작하면 좋을까요?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 고려한 대안
