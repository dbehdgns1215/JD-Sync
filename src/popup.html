<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JD-Sync</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <strong>JD-Sync</strong>
        <span id="configStatus" class="status-dot status-dot-missing" aria-label="설정 확인 중" title="설정 확인 중"></span>
      </header>

      <button id="settingsButton" type="button" class="secondary">설정</button>

      <section>
        <h2>최근 기록</h2>
        <ol id="logList"></ol>
      </section>

      <p id="message" role="status"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
