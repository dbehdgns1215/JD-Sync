<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JD-Sync</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <strong>JD-Sync</strong>
        <span id="configStatus">확인 중</span>
      </header>

      <p id="summary">설정 상태를 확인하고 있어요.</p>

      <button id="syncCurrentButton" type="button">현재 공고 수동 동기화</button>
      <button id="guideButton" type="button" class="secondary">가이드 열기</button>

      <section>
        <h2>최근 기록</h2>
        <ol id="logList"></ol>
      </section>

      <p id="message" role="status"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
